name: CI
on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - master
  schedule:
    - cron: "0 6 * * *"
jobs:
  js_tests:
    name: Run JS/TS unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  perl_tests:
    name: Run Perl integration tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Get Koha stable branch
      id: koha-version
      uses: "bywatersolutions/github-action-koha-get-version-by-label@main"
      with:
        version-label: stable

    - name: Check out Koha
      run: |
        cd ..
        git clone --branch ${{ steps.koha-version.outputs.current-branch-name }} --single-branch --depth 1 https://github.com/Koha-Community/Koha.git koha

    - name: Set up koha-testing-docker
      run: |
        sudo sysctl -w vm.max_map_count=262144
        IFS='/' read -r -a parts <<< "$GITHUB_REPOSITORY"
        cd ..
        git clone --depth 1 https://gitlab.com/koha-community/koha-testing-docker.git koha-testing-docker
        cp koha-testing-docker/env/defaults.env koha-testing-docker/.env
        echo "$(cd koha-testing-docker && pwd)/bin" >> "$GITHUB_PATH"
        {
          echo "GITHUB_REPO=${parts[1]}"
          echo "KTD_HOME=$(cd koha-testing-docker && pwd)"
          echo "SYNC_REPO=$(pwd)/koha"
          echo "LOCAL_USER_ID=$(id -u)"
          echo "KOHA_IMAGE=main"
          echo "KOHA_MARC_FLAVOUR=marc21"
          echo "KOHA_INTRANET_URL=http://127.0.0.1:8081"
          echo "RUN_TESTS_AND_EXIT=no"
        } >> "$GITHUB_ENV"

    - name: Start Koha services
      run: |
        ktd --name lmseventmanagement up -d
        docker exec lmseventmanagement-koha-1 apt-get install -y libyaml-syck-perl libemail-valid-perl libmojo-jwt-perl 2>/dev/null || true

    - name: Wait for Koha to be ready
      run: |
        echo "Waiting for Koha services to initialize..."
        for i in $(seq 1 60); do
          if docker exec lmseventmanagement-koha-1 perl -e '
            use C4::Context;
            my $dbh = C4::Context->dbh or die;
            $dbh->selectrow_array("SELECT 1 FROM systempreferences LIMIT 1") or die;
          ' 2>/dev/null; then
            echo "Koha is ready after ~${i}0 seconds."
            break
          fi
          sleep 10
        done

    - name: Copy plugin and run tests
      run: |
        docker cp . lmseventmanagement-koha-1:/var/lib/koha/kohadev/plugins
        docker exec lmseventmanagement-koha-1 /kohadevbox/koha/misc/devel/install_plugins.pl
        docker exec lmseventmanagement-koha-1 bash -c 'prove -v /var/lib/koha/kohadev/plugins/t'

    - name: Show logs on failure
      if: failure()
      run: docker logs lmseventmanagement-koha-1 2>&1 | tail -100

    - name: Cleanup
      if: always()
      run: |
        ktd --name lmseventmanagement down 2>/dev/null || true

  unit_tests:
    name: Run multi-version compatibility tests
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        koha-version: [main, stable, oldstable]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Get Koha Version Branch Name
      id: koha-version
      uses: "bywatersolutions/github-action-koha-get-version-by-label@main"
      with:
        version-label: "${{ matrix.koha-version }}"

    - name: Check out Koha
      run: |
        cd ..
        git clone --branch ${{ steps.koha-version.outputs.current-branch-name }} --single-branch --depth 1 https://github.com/Koha-Community/Koha.git koha

    - name: Set up koha-testing-docker
      run: |
        sudo sysctl -w vm.max_map_count=262144
        IFS='/' read -r -a parts <<< "$GITHUB_REPOSITORY"
        cd ..
        git clone --depth 1 https://gitlab.com/koha-community/koha-testing-docker.git koha-testing-docker
        cp koha-testing-docker/env/defaults.env koha-testing-docker/.env
        echo "$(cd koha-testing-docker && pwd)/bin" >> "$GITHUB_PATH"
        {
          echo "GITHUB_REPO=${parts[1]}"
          echo "KTD_HOME=$(cd koha-testing-docker && pwd)"
          echo "SYNC_REPO=$(pwd)/koha"
          echo "LOCAL_USER_ID=$(id -u)"
          echo "KOHA_IMAGE=main"
          echo "KOHA_MARC_FLAVOUR=marc21"
          echo "KOHA_INTRANET_URL=http://127.0.0.1:8081"
          echo "RUN_TESTS_AND_EXIT=no"
        } >> "$GITHUB_ENV"

    - name: Start Koha services
      run: |
        ktd --name lmseventmanagement up -d
        docker exec lmseventmanagement-koha-1 apt-get install -y libyaml-syck-perl libemail-valid-perl libmojo-jwt-perl 2>/dev/null || true

    - name: Wait for Koha to be ready
      run: |
        echo "Waiting for Koha services to initialize..."
        for i in $(seq 1 60); do
          if docker exec lmseventmanagement-koha-1 perl -e '
            use C4::Context;
            my $dbh = C4::Context->dbh or die;
            $dbh->selectrow_array("SELECT 1 FROM systempreferences LIMIT 1") or die;
          ' 2>/dev/null; then
            echo "Koha is ready after ~${i}0 seconds."
            break
          fi
          sleep 10
        done

    - name: Copy plugin and run tests
      run: |
        docker cp . lmseventmanagement-koha-1:/var/lib/koha/kohadev/plugins
        docker exec lmseventmanagement-koha-1 /kohadevbox/koha/misc/devel/install_plugins.pl
        docker exec lmseventmanagement-koha-1 bash -c 'prove -v /var/lib/koha/kohadev/plugins/t'

    - name: Show logs on failure
      if: failure()
      run: docker logs lmseventmanagement-koha-1 2>&1 | tail -100

    - name: Cleanup
      if: always()
      run: |
        ktd --name lmseventmanagement down 2>/dev/null || true

  release:
    name: Build & Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [perl_tests, unit_tests]
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v1

    - name: Parse out and store the GitHub repository name
      id: myvars
      run: |
        IFS='/' read -r -a parts <<< "$GITHUB_REPOSITORY"
        GITHUB_REPO="${parts[1]}"
        echo ::set-output name=github_repo::$GITHUB_REPO
        echo "GITHUB REPO: $GITHUB_REPO"

        TAG_VERSION="${GITHUB_REF##*/}"
        echo "TAG VERSION: $TAG_VERSION"
        TAG_VERSION="${TAG_VERSION:1}"
        echo "TAG VERSION 2: $TAG_VERSION"
        echo ::set-output name=tag_version::$TAG_VERSION

    - name: Get Koha Version Branch Name
      id: koha-version-oldstable
      uses: "bywatersolutions/github-action-koha-get-version-by-label@main"
      with:
        version-label: "oldstable"

    - name: Print minimum version
      run: |
        echo "Current oldstable version: ${{ steps.koha-version-oldstable.outputs.version-major-minor }}"

    - name: Dump myvars outputs
      env:
        GITHUB_CONTEXT: ${{ toJson(steps.myvars.outputs) }}
      run: echo "$GITHUB_CONTEXT"

    - name: Build Koha Plugin kpz artifact
      id: kpz
      uses: "bywatersolutions/github-action-koha-plugin-create-kpz@main"
      with:
        release-version: ${{ steps.myvars.outputs.tag_version }}
        release-name: ${{ steps.myvars.outputs.github_repo }}
        minimum-version: ${{ steps.koha-version-oldstable.outputs.version-major-minor }}
        plugin-module: "Koha/Plugin/Com/LMSCloud/EventManagement.pm"

    - name: See if kpz was created
      run: |
        echo "FILENAME: ${{ steps.kpz.outputs.filename }}"
        ls -alh

    - name: Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          ${{ steps.kpz.outputs.filename }}
          CHANGELOG.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  keepalive:
    name: Keep Alive
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Check age and push commit if needed
      run: |
        LAST_COMMIT=$( git --no-pager log -1 --format=%ct )
        NOW=$(date +%s)
        DIFF=$(($NOW-$LAST_COMMIT))
        DAYS=$(($DIFF/86400))
        git config --global user.email kyle@bywatersolutions.com
        git config --global user.name "Kyle M Hall"
        git commit --allow-empty -m "Automated commit from keep alive workflow"
        if [ "$DAYS" -gt "50" ]; then git push; fi
